name: 每日自動資訊彙報

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

# =========================================
# 本次新增核心：在程式碼層級強制宣告寫入權限
# 這能直接覆寫任何 GitHub 後台的權限阻擋機制
permissions:
  contents: write
# =========================================

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4 # 退回最穩定的 v4 版本以確保相容性

      - name: 設定 Python 環境
        uses: actions/setup-python@v5 # 退回最穩定的 v5 版本以確保相容性
        with:
          python-version: '3.10'

      - name: 安裝工具包
        run: pip install -r requirements.txt

      - name: 執行抓取與寄信程式
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_ENGINE_ID: ${{ secrets.SEARCH_ENGINE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: 將最新資料存回 GitHub
        run: |
          git config --global user.name "Automated Bot"
          git config --global user.email "bot@example.com"
          git add news_data.json
          git commit -m "自動更新每日新聞資料" || echo "沒有新資料需要更新"
          git push
